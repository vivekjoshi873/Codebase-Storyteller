<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('cs-theme');
          var prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)'
          ).matches;
          var theme = stored
            ? stored
            : (prefersDark ? 'dark' : 'light');
          document.documentElement.classList.add(theme);
          if (theme === 'light') {
            document.documentElement.style.backgroundColor = '#F8F6F1';
          } else {
            document.documentElement.style.backgroundColor = '#0A0A0F';
          }
        } catch(e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codebase Storyteller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Lora:ital@1&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
